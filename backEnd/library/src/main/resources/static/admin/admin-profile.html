<script>
    function GetUserData() {
        var url = "http://localhost:9098/User/getUserById/" + localStorage.getItem("userId");

        $.ajax({
            url: url,
            type: "GET",
            dataType: "json",
            success: function (data) {
                $("#name").val(data.name);
                $("#email").val(data.email);
                $("#phone").val(data.phone);
                $("#password").val(data.password);
                $("#userRole").val(data.userRole);
                if (data.gender === "male") {
                    $("#male").prop("checked", true);
                }
                else if (data.gender === "female") {
                    $("#female").prop("checked", true);
                }
            },
            error: function () {
                console.log("Error");
            }
        });
    }

    GetUserData();

</script>

    <script>
        $(document).ready(function() {
            $("#updateButton").click(updateUser);
        });
    </script>
    <script>
        function updateUser() {
            event.preventDefault();

            //  Get values from form fields
            var name = $("#name").val();
            var email = $("#email").val();
            var password = $("#password").val();
            var gender = $("input[name='gender']:checked").val();
            var phone = $("#phone").val();
            var userRole = $("#userRole").val();

            // Get the userId from localStorage
            var userId = localStorage.getItem("userId");

            // Set the form action URL with the userId
            $("#updateForm").attr("action", "User/UpdateUser/" + userId);

            // Create formdata object
            var formdata = {
                "name": name,
                "email": email,
                "password": password,
                "gender": gender,
                "phone": phone,
                "userRole": userRole
            };

            $.ajax({
                url: "http://localhost:9098/User/UpdateUser/" + userId,
                type: "PUT",
                contentType: "application/json",
                data: JSON.stringify(formdata),
                success: function(data) {
                    console.log("User data updated successfully:", data);
                },
                error: function() {
                    console.error("Error");
                }
            });
        }

    </script>
